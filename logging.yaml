version: 1
disable_existing_loggers: false

formatters:
  standard:
    format: "%(asctime)s %(levelname)s [%(name)s] %(message)s"

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: standard
    stream: ext://sys.stdout
  file:
    class: logging.handlers.RotatingFileHandler
    level: INFO
    formatter: standard
    filename: logs/backend.log
    maxBytes: 10485760
    backupCount: 5
    encoding: utf-8

root:
  level: INFO
  handlers:
    - console
    - file

loggers:
  uvicorn:
    level: INFO
    handlers:
      - console
      - file
    propagate: false
  uvicorn.error:
    level: INFO
  uvicorn.access:
    level: INFO
    handlers:
      - console
      - file
    propagate: false
  app:
    level: INFO
    handlers:
      - console
      - file
    propagate: false

